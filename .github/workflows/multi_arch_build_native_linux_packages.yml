name: Build Multi-Arch Native Linux Packages

on:
  workflow_call:
    inputs:
      dist_amdgpu_families:
        description: "Semicolon-separated list of all GPU families (e.g., 'gfx94X-dcgpu;gfx120X-all')"
        required: true
        type: string
      artifact_run_id:
        description: "Workflow run id to download the artifacts from"
        required: true
        type: string
      rocm_version:
        description: "ROCm version to append to the package (8.0.0, 8.0.1rc1, ...)"
        required: true
        type: string
      native_package_type:
        description: "Package type (deb or rpm)"
        required: true
        type: string
      package_suffix:
        description: "The suffix to be added to package name (asan, tsan, static or rpath)"
        required: false
        type: string
        default: ""
      release_type:
        description: "The type of release to build ('dev', 'nightly', or 'release'). Empty string for CI builds."
        required: false
        type: string
        default: ""
      repository:
        description: "Repository to checkout. Otherwise, defaults to `github.repository`"
        type: string
        required: false
      ref:
        description: "Branch, tag or SHA to checkout. Defaults to the reference or SHA that triggered the workflow"
        type: string
        required: false
    outputs:
      package_repository_url:
        description: "Public repository URL for package installation"
        value: ${{ jobs.build_native_packages.outputs.package_repository_url }}

permissions:
  id-token: write
  contents: read

run-name: Build ${{ inputs.native_package_type }} packages (${{ inputs.rocm_version }}, ${{ inputs.dist_amdgpu_families }}${{ inputs.release_type && format(', {0}', inputs.release_type) || '' }})

jobs:
  build_native_packages:
    name: Build ${{ inputs.native_package_type }} packages
    runs-on: ${{ github.repository_owner == 'ROCm' && 'azure-linux-scale-rocm' || 'ubuntu-24.04' }}
    outputs:
      package_repository_url: ${{ steps.upload-packages.outputs.package_repository_url }}
    env:
      ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id }}
      DIST_AMDGPU_FAMILIES: ${{ inputs.dist_amdgpu_families }}
      PACKAGE_SUFFIX: ${{ inputs.package_suffix }}
      OUTPUT_DIR: ${{ github.workspace }}/output
      ARTIFACTS_DIR: ${{ github.workspace }}/output/artifacts
      PACKAGE_DIST_DIR: ${{ github.workspace }}/output/packages
      RELEASE_TYPE: ${{ inputs.release_type }}
    steps:
      - name: Checking out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || '' }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install Python requirements
        run: |
          pip install pyelftools boto3 jinja2 pyzstd

      - name: Install System requirements
        run: |
          # Install the needed tools for creating rpm / deb packages
          # Also install tools for creating repo files
          sudo apt update
          sudo apt install -y llvm-20
          sudo apt install -y rpm debhelper-compat build-essential
          sudo apt install -y dpkg-dev createrepo-c

      - name: Determine IAM role
        id: iam_role
        run: |
          # ================================================================
          # IAM Role Selection Logic
          # ================================================================
          # CI builds (empty RELEASE_TYPE) use therock-ci role for the
          # artifacts bucket. Release builds (dev/nightly/prerelease) use
          # the matching therock-{type} role for the packages bucket.
          # ================================================================

          RELEASE_TYPE="${{ env.RELEASE_TYPE }}"

          if [[ -z "${RELEASE_TYPE}" ]]; then
            IAM_ROLE="arn:aws:iam::692859939525:role/therock-ci"
            echo "✓ Using CI role: ${IAM_ROLE}"
          else
            IAM_ROLE="arn:aws:iam::692859939525:role/therock-${RELEASE_TYPE}"
            echo "✓ Using release-type role: ${IAM_ROLE}"
          fi

          echo "iam_role=${IAM_ROLE}" >> $GITHUB_OUTPUT

      - name: Fetch Artifacts for all GPU families
        run: |
          # Use artifact_manager.py for consistent multi-arch artifact fetching
          # NOTE: artifact_manager.py appends /artifacts to --output-dir in non-flatten mode,
          # so we pass OUTPUT_DIR (parent) to have artifacts land in $OUTPUT_DIR/artifacts
          # which matches the ARTIFACTS_DIR environment variable
          python ./build_tools/artifact_manager.py fetch \
            --run-id="${{ env.ARTIFACT_RUN_ID }}" \
            --stage=all \
            --amdgpu-families="${{ env.DIST_AMDGPU_FAMILIES }}" \
            --output-dir="${{ env.OUTPUT_DIR }}"

      - name: Build Packages
        id: build-packages
        run: |
          # Pass the target families as-is (semicolon-separated)
          # build_package.py's normalize_target_list() handles all separators
          # KPACK_SPLIT_ARTIFACTS is auto-detected from therock_manifest.json
          python ./build_tools/packaging/linux/build_package.py \
            --dest-dir "${{ env.PACKAGE_DIST_DIR }}" \
            --rocm-version  "${{ inputs.rocm_version }}" \
            --target "${{ env.DIST_AMDGPU_FAMILIES }}" \
            --artifacts-dir "${{ env.ARTIFACTS_DIR }}" \
            --pkg-type "${{ inputs.native_package_type }}" \
            --version-suffix "${{ env.ARTIFACT_RUN_ID }}"

      - name: Configure AWS Credentials
        # Only assume OIDC role for authorized repositories (ROCm/TheRock, ROCm/rockrel).
        # Allowing both CI builds (TheRock) and release builds (rockrel) to upload packages.
        if: ${{ (github.repository == 'ROCm/TheRock' || github.repository == 'ROCm/rockrel') && !github.event.pull_request.head.repo.fork }}
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-region: us-east-2
          role-to-assume: ${{ steps.iam_role.outputs.iam_role }}

      - name: Upload Package repo to S3
        id: upload-packages
        run: |
          python ./build_tools/packaging/linux/upload_package_repo.py \
            --pkg-type "${{ inputs.native_package_type }}" \
            --run-id "${{ env.ARTIFACT_RUN_ID }}"
